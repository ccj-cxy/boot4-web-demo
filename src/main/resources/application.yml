server:
  port: 80
  servlet:
    context-path: /

spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: demo
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 1GB
  datasource:
    druid: # Druid 【监控】相关的全局配置
      web-stat-filter:
        enabled: true
      stat-view-servlet:
        enabled: true
        allow: # 设置白名单，不填则允许所有访问
        url-pattern: /druid/*
        login-username: # 控制台管理用户名和密码
        login-password:
      filter:
        stat:
          enabled: true
          log-slow-sql: true # 慢 SQL 记录
          slow-sql-millis: 100
          merge-sql: true
        wall:
          config:
            multi-statement-allow: true
    dynamic:
      primary: mysql #设置默认的数据源或者数据源组，默认值即为 master
      druid: # Druid 【连接池】相关的全局配置
        # 初始连接数不需要太大，OLAP 数据库建议设小一点
        initial-size: 2
        # 最小空闲连接数
        min-idle: 2
        # 最大活跃连接数（根据业务并发量调整）
        max-active: 20
        # 获取连接的等待时间（毫秒）
        max-wait: 60000
        # 检查连接是否有效的超时时间
        validation-query-timeout: 3
        validation-query: SELECT 1 FROM DUAL # 配置检测连接是否有效
        test-while-idle: true
        test-on-borrow: false
        test-on-return: false
        pool-prepared-statements: true
      strict: true #严格匹配数据源，默认 false. true 未匹配到指定数据源时抛异常,false 使用默认数据源
      datasource:
        mysql:
          url: jdbc:mysql://127.0.0.1:3306/auth_resource
          username: root
          password: 123456
          driverClassName: com.mysql.cj.jdbc.Driver

#开发环境打开sql打印减少日志存储
mybatis-plus-log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
